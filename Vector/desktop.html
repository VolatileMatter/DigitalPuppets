<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>JaxCorp — Desktop</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }

    body {
      width:100vw; height:100vh;
      overflow:hidden;
      font-family: 'Tahoma', sans-serif;
      cursor: default;
    }

    /* ── DESKTOP ── */
    #desktop {
      position:absolute; inset:0;
      background: #000 url('desktop.png') center center / cover no-repeat;
      display:flex; flex-direction:column;
      padding: 10px;
    }

    /* ── FOLDER ICON ── */
    .folder-icon {
      display:inline-flex; flex-direction:column;
      align-items:center; gap:3px;
      width:80px; cursor:pointer; padding:4px;
    }
    .folder-icon:hover .icon-label { background:#0a246a; color:#fff; }
    .folder-svg { width:48px; height:48px; display:block; }
    .icon-label {
      font-size:11px; color:#fff;
      text-shadow: 1px 1px 2px #000;
      text-align:center; padding:1px 4px;
      border:1px solid transparent; white-space:nowrap;
    }

    /* ── TASKBAR ── */
    #taskbar {
      position:absolute; bottom:0; left:0; right:0;
      height:30px;
      background: linear-gradient(to bottom, #245edc 0%, #1c4ec8 3%, #2060e0 6%, #1850d0 100%);
      display:flex; align-items:center;
      border-top: 2px solid #4080ff;
      z-index:10;
    }
    #start-btn {
      height:100%; padding: 0 10px 0 6px;
      background: linear-gradient(to bottom, #4db04d 0%, #35a035 50%, #2d8a2d 100%);
      border: none; border-right: 1px solid #1a6a1a;
      border-radius: 0 12px 12px 0;
      display:flex; align-items:center; gap:5px;
      font-family:'Tahoma',sans-serif; font-size:13px; font-weight:bold;
      color:#fff; text-shadow:1px 1px 2px #000; cursor:pointer; outline:none;
    }
    #start-btn:hover { background: linear-gradient(to bottom,#5ac85a 0%,#40b040 50%,#38a038 100%); }
    .start-logo {
      width:18px; height:18px;
      background: radial-gradient(circle at 40% 40%, #ff8800, #cc4400);
      border-radius:50%; box-shadow:0 0 4px rgba(0,0,0,0.5);
    }
    .ql { display:flex; align-items:center; height:100%; border-right:1px solid #1840a8; padding:0 4px; }
    .ql-icon { width:20px; height:20px; margin:0 2px; opacity:0.8; }
    #taskbar-apps { flex:1; display:flex; align-items:center; height:100%; padding:0 4px; gap:3px; }
    .task-btn {
      height:22px; padding:0 8px;
      background:linear-gradient(to bottom,#3070e0,#1850c0);
      border:1px solid #4a80f0; border-radius:3px;
      color:#fff; font-size:11px; cursor:pointer;
      white-space:nowrap; overflow:hidden; max-width:160px; text-overflow:ellipsis;
    }
    #tray {
      margin-left:auto; padding:0 8px;
      font-size:11px; color:#fff; text-shadow:1px 1px 1px #000;
      border-left:1px solid #1840a8; height:100%; display:flex; align-items:center;
      background:rgba(0,0,50,0.2);
    }

    /* ── FINGERPRINT OVERLAY ── */
    #fp-overlay {
      display:none; position:fixed; inset:0; background:#000;
      z-index:100; align-items:center; justify-content:center;
      flex-direction:column; cursor:pointer;
    }
    #fp-overlay.active { display:flex; }
    #fp-text {
      font-family:'Tahoma',Arial,sans-serif;
      font-size:clamp(32px,5vw,72px); font-weight:bold;
      color:#fff; letter-spacing:0.08em; text-align:center;
      text-shadow: 0 0 40px rgba(255,255,255,0.3); padding:20px;
    }
    .fp-icon { width:120px; height:120px; margin-bottom:30px; }
    .fp-pulse { animation: fp-pulse 2s ease-in-out infinite; }
    @keyframes fp-pulse {
      0%,100% { opacity:0.4; transform:scale(1); }
      50%      { opacity:0.9; transform:scale(1.05); }
    }

    /* ── MEDIA PLAYER ── */
    #player-overlay {
      display:none; position:fixed; inset:0; background:#111;
      z-index:200; align-items:center; justify-content:center;
    }
    #player-overlay.active { display:flex; }

    #player-window {
      width:98vw; height:97vh;
      background:#1c1c1c; border:2px solid #555;
      box-shadow:0 8px 60px rgba(0,0,0,0.9);
      border-radius:4px; overflow:hidden;
      display:flex; flex-direction:column;
    }

    /* WMP titlebar */
    #player-titlebar {
      background:linear-gradient(to right,#1a1a2a 0%,#2a3a6a 60%,#1a1a2a 100%);
      height:28px; flex-shrink:0; display:flex; align-items:center;
      padding:0 8px; gap:6px; border-bottom:1px solid #333;
    }
    .wmp-logo {
      width:18px; height:18px; border-radius:50%;
      background:radial-gradient(circle at 35% 35%,#c0e0ff,#0044aa);
    }
    #player-title-text { flex:1; font-size:11px; color:#aac0e0; font-family:Tahoma,sans-serif; }
    .wmp-btn {
      width:16px; height:14px; background:#2a2a3a; border:1px solid #444;
      color:#888; font-size:9px; line-height:12px; text-align:center; cursor:pointer;
    }
    .wmp-btn:hover { background:#3a3a4a; color:#bbb; }

    /* menu bar */
    #player-menu {
      background:#111; border-bottom:1px solid #222;
      padding:2px 6px; flex-shrink:0; display:flex; gap:14px;
    }
    .pm-item { font-size:11px; color:#888; font-family:Tahoma,sans-serif; cursor:default; padding:1px 4px; }
    .pm-item:hover { background:#2a2a3a; color:#bbb; }

    /* ── VIDEO AREA: 4:3 ratio, centred ── */
    #video-wrapper {
      flex:1; min-height:0;
      background:#000;
      display:flex; align-items:center; justify-content:center;
    }
    #video-container {
      /* enforce 4:3 — as tall as available, constrained to 4:3 width */
      position:relative;
      height:100%;
      aspect-ratio: 4 / 3;
      max-width:100%;
      background:#000;
      overflow:hidden;
    }
    /* video slightly oversized (106%) so gentle shake never shows edge */
    #main-video {
      position:absolute;
      width:106%; height:106%;
      top:-3%; left:-3%;
      object-fit:cover; display:block;
      filter: blur(var(--vid-blur, 0px));
      transform: translate(var(--vid-tx,0px), var(--vid-ty,0px));
      will-change: transform, filter;
    }

    /* grain canvas */
    #grain-canvas {
      position:absolute; inset:0; width:100%; height:100%;
      pointer-events:none; mix-blend-mode:screen; opacity:0.18;
    }
    /* scanlines */
    #vhs-overlay {
      position:absolute; inset:0; pointer-events:none;
      background:repeating-linear-gradient(to bottom,
        transparent 0px,transparent 3px,
        rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px);
    }
    /* chroma */
    #chroma-overlay {
      position:absolute; inset:0; pointer-events:none;
      box-shadow:inset 4px 0 0 rgba(255,0,0,0.08), inset -4px 0 0 rgba(0,180,255,0.06);
    }
    /* vignette */
    #vignette {
      position:absolute; inset:0; pointer-events:none;
      background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.65) 100%);
    }
    /* timecode */
    #timecode {
      position:absolute; bottom:8px; left:10px;
      font-family:'Courier New',monospace; font-size:12px;
      color:rgba(255,255,180,0.82); text-shadow:1px 1px 3px #000;
      pointer-events:none; letter-spacing:0.06em;
    }
    #video-placeholder {
      position:absolute; inset:0;
      color:#333; font-family:Tahoma,sans-serif; font-size:13px;
      display:flex; align-items:center; justify-content:center;
    }

    /* controls */
    #player-controls {
      background:#1a1a1a; padding:6px 8px 4px;
      border-top:1px solid #2a2a2a; flex-shrink:0;
    }
    #seek-track {
      width:100%; height:8px; background:#2a2a2a; border:1px solid #333;
      margin-bottom:6px; position:relative; overflow:hidden; cursor:pointer;
    }
    #seek-fill { height:100%; background:linear-gradient(to right,#4080c0,#60a0e0); width:0%; }
    #ctrl-row { display:flex; align-items:center; gap:6px; }
    .ctrl-btn {
      background:#2a2a2a; border:1px solid #3a3a3a; color:#aaa;
      font-size:11px; font-family:Tahoma,sans-serif;
      padding:2px 8px; cursor:pointer; white-space:nowrap;
    }
    .ctrl-btn:hover { background:#3a3a3a; color:#ddd; }
    .ctrl-btn.active { background:#1a4a7a; border-color:#4a8abf; color:#c0e0ff; }
    #track-label { flex:1; font-size:10px; color:#555; font-family:Tahoma,sans-serif; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-left:4px; }
    #time-display { font-size:10px; color:#446; font-family:'Courier New',monospace; }
    #vol-wrap { display:flex; align-items:center; gap:4px; }
    #vol-wrap span { font-size:10px; color:#555; font-family:Tahoma,sans-serif; }
    #vol-slider { width:60px; height:4px; appearance:none; background:#2a2a2a; border:1px solid #333; cursor:pointer; }
    #vol-slider::-webkit-slider-thumb { appearance:none; width:10px; height:14px; background:#4080c0; border:1px solid #224; }

    /* playlist */
    #playlist-panel { background:#0d0d0d; border-top:1px solid #222; max-height:80px; overflow-y:auto; flex-shrink:0; }
    .pl-item { font-size:11px; font-family:Tahoma,sans-serif; color:#555; padding:3px 10px; cursor:pointer; border-bottom:1px solid #111; display:flex; gap:8px; }
    .pl-item:hover { background:#1a1a2a; color:#889; }
    .pl-item.active { color:#80b0e0; background:#0d1a2a; }
    .pl-num { color:#333; min-width:20px; }

    #player-status {
      background:#0d0d0d; border-top:1px solid #181818;
      padding:2px 8px; font-size:10px; color:#334; font-family:Tahoma,sans-serif;
      display:flex; justify-content:space-between; flex-shrink:0;
    }

    /* fullscreen hint */
    #fs-hint {
      position:fixed; bottom:36px; right:12px;
      font-size:10px; color:rgba(255,255,255,0.25);
      font-family:'Courier New',monospace; pointer-events:none;
      z-index:5; letter-spacing:0.08em;
    }
  </style>
</head>
<body>

<!-- DESKTOP -->
<div id="desktop">
  <div class="folder-icon" onclick="showFingerprint()" tabindex="0">
    <svg class="folder-svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="14" width="44" height="30" rx="2" fill="#f5c842" stroke="#c8972a" stroke-width="1.5"/>
      <path d="M2 18 Q2 14 6 14 H20 L24 10 H42 Q46 10 46 14 V18 Z" fill="#f5c842" stroke="#c8972a" stroke-width="1.2"/>
      <rect x="2" y="18" width="44" height="26" rx="1" fill="#f8d84a" stroke="#c8972a" stroke-width="1"/>
      <path d="M6 20 Q24 18 42 22" stroke="#ffe97a" stroke-width="1.5" opacity="0.7"/>
    </svg>
    <div class="icon-label">33.9425-118.4385</div>
  </div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
  <button id="start-btn"><div class="start-logo"></div>start</button>
  <div class="ql">
    <svg class="ql-icon" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="#1e90ff" opacity="0.7"/></svg>
    <svg class="ql-icon" viewBox="0 0 20 20"><rect x="2" y="2" width="16" height="16" rx="2" fill="#228b22" opacity="0.7"/></svg>
  </div>
  <div id="taskbar-apps"><div class="task-btn">Windows Media Player</div></div>
  <div id="tray"><span id="task-clock">9:12 AM</span></div>
</div>

<!-- fullscreen hint -->
<div id="fs-hint">[F] fullscreen</div>

<!-- FINGERPRINT OVERLAY -->
<div id="fp-overlay" onclick="dismissFingerprint()">
  <svg class="fp-icon fp-pulse" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="48" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <path d="M50 15 C30 15 15 30 15 50 C15 65 22 78 33 86" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M50 20 C32 20 20 34 20 50 C20 62 26 73 36 80" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M50 26 C35 26 26 38 26 50 C26 61 31 70 40 76" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M50 32 C38 32 32 42 32 50 C32 59 36 67 43 72" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M50 38 C42 38 38 45 38 50 C38 57 41 63 47 67" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M50 44 C46 44 44 48 44 52 C44 56 46 60 50 62" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M50 15 C70 15 85 30 85 50 C85 65 78 78 67 86" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M50 20 C68 20 80 34 80 50 C80 62 74 73 64 80" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M50 26 C65 26 74 38 74 50 C74 61 69 70 60 76" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M50 32 C62 32 68 42 68 50 C68 59 64 67 57 72" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M50 38 C58 38 62 45 62 50 C62 57 59 63 53 67" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M50 44 C54 44 56 48 56 52 C56 56 54 60 50 62" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </svg>
  <div id="fp-text">PLEASE SCAN FINGERPRINT</div>
</div>

<!-- MEDIA PLAYER -->
<div id="player-overlay">
  <div id="player-window">
    <div id="player-titlebar">
      <div class="wmp-logo"></div>
      <div id="player-title-text">Windows Media Player</div>
      <div class="wmp-btn">_</div>
      <div class="wmp-btn">□</div>
      <div class="wmp-btn" onclick="closePlayer()">×</div>
    </div>
    <div id="player-menu">
      <span class="pm-item">File</span>
      <span class="pm-item">View</span>
      <span class="pm-item">Play</span>
      <span class="pm-item">Tools</span>
      <span class="pm-item">Help</span>
    </div>

    <!-- 4:3 wrapper -->
    <div id="video-wrapper">
      <div id="video-container">
        <video id="main-video" preload="auto"></video>
        <canvas id="grain-canvas"></canvas>
        <div id="vhs-overlay"></div>
        <div id="chroma-overlay"></div>
        <div id="vignette"></div>
        <div id="timecode"></div>
        <div id="video-placeholder">Loading media library...</div>
      </div>
    </div>

    <div id="player-controls">
      <div id="seek-track" onclick="seekClick(event)"><div id="seek-fill"></div></div>
      <div id="ctrl-row">
        <button class="ctrl-btn" onclick="prevTrack()">|◄</button>
        <button class="ctrl-btn active" id="btn-play" onclick="togglePlay()">▶ Play</button>
        <button class="ctrl-btn" onclick="stopTrack()">■ Stop</button>
        <button class="ctrl-btn" onclick="nextTrack()">►|</button>
        <span id="track-label">—</span>
        <span id="time-display">0:00 / 0:00</span>
        <div id="vol-wrap">
          <span>🔊</span>
          <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.8" oninput="setVol(this.value)"/>
        </div>
      </div>
    </div>
    <div id="playlist-panel"></div>
    <div id="player-status">
      <span id="status-text">Ready.</span>
      <span>Windows Media Player v8.0</span>
    </div>
  </div>
</div>

<script>
  // ── FAKE CLOCK: starts at 9:12 AM, advances in real time ──
  const PAGE_OPEN = Date.now();
  const FAKE_START_MIN = 9 * 60 + 12; // 9:12 AM in minutes

  function fakeClock() {
    const elapsedMs  = Date.now() - PAGE_OPEN;
    const totalMin   = FAKE_START_MIN + Math.floor(elapsedMs / 60000);
    const h24        = Math.floor(totalMin / 60) % 24;
    const m          = totalMin % 60;
    const ampm       = h24 < 12 ? 'AM' : 'PM';
    const h12        = h24 % 12 || 12;
    document.getElementById('task-clock').textContent =
      h12 + ':' + String(m).padStart(2,'0') + ' ' + ampm;
  }
  fakeClock();
  setInterval(fakeClock, 10000); // update every 10s (taskbar resolution)

  // ── FULLSCREEN (F key) — works on desktop, fingerprint, and player ──
  document.addEventListener('keydown', e => {
    if (e.key !== 'f' && e.key !== 'F') return;
    // Don't hijack if user is typing in an input
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;

    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  });

  // ── FINGERPRINT ──
  function showFingerprint() { document.getElementById('fp-overlay').classList.add('active'); }
  function dismissFingerprint() {
    document.getElementById('fp-overlay').classList.remove('active');
    openPlayer();
  }

  // ── VIDEO PLAYER ──
  const VIDEO_DIR = 'Videos/';
  let tracks = [];
  let currentIndex = 0;
  let advancing = false;
  const vid = document.getElementById('main-video');
  const placeholder = document.getElementById('video-placeholder');

  async function buildPlaylist() {
    try {
      const r = await fetch(VIDEO_DIR + 'manifest.json');
      if (r.ok) {
        const data = await r.json();
        tracks = data.files.map(f => ({ name: f, src: VIDEO_DIR + f }));
      }
    } catch(e) {}

    if (tracks.length === 0) {
      const candidates = [];
      for (let i=1;i<=20;i++) {
        candidates.push(i.toString().padStart(2,'0')+'.mp4');
        candidates.push('video'+i+'.mp4');
        candidates.push('clip'+i+'.mp4');
      }
      const checks = await Promise.allSettled(
        [...new Set(candidates)].sort().map(f =>
          fetch(VIDEO_DIR+f,{method:'HEAD'}).then(r=>r.ok?f:null)
        )
      );
      tracks = checks
        .filter(c=>c.status==='fulfilled'&&c.value)
        .map(c=>({name:c.value,src:VIDEO_DIR+c.value}))
        .sort((a,b)=>a.name.localeCompare(b.name));
    }

    renderPlaylist();
    if (tracks.length > 0) {
      placeholder.style.display = 'none';
      loadTrack(0);
    } else {
      placeholder.textContent = 'No media files found in /Vector/Videos/';
      document.getElementById('status-text').textContent = 'No media found.';
    }
  }

  function renderPlaylist() {
    const panel = document.getElementById('playlist-panel');
    panel.innerHTML = '';
    tracks.forEach((item,i)=>{
      const d = document.createElement('div');
      d.className = 'pl-item'+(i===currentIndex?' active':'');
      d.innerHTML = `<span class="pl-num">${i+1}.</span><span>${item.name}</span>`;
      d.onclick = ()=>loadTrack(i);
      panel.appendChild(d);
    });
  }

  function loadTrack(idx) {
    if (idx < 0 || idx >= tracks.length) return;
    advancing = false;
    currentIndex = idx;
    const item = tracks[idx];
    vid.src = item.src;
    vid.load();
    vid.play().catch(()=>{});
    document.getElementById('track-label').textContent = item.name;
    document.getElementById('player-title-text').textContent = 'Windows Media Player — '+item.name;
    document.getElementById('status-text').textContent = 'Now playing: '+item.name;
    document.getElementById('btn-play').textContent = '❚❚ Pause';
    document.getElementById('btn-play').classList.add('active');
    renderPlaylist();
  }

  function advanceOrEnd() {
    if (advancing) return;
    advancing = true;
    if (currentIndex + 1 < tracks.length) {
      loadTrack(currentIndex + 1);
    } else {
      // Last video — pause on final frame, stay in player
      vid.pause();
      document.getElementById('status-text').textContent = 'Playback complete.';
      document.getElementById('btn-play').textContent = '▶ Play';
    }
  }

  vid.addEventListener('timeupdate', () => {
    updateSeek();
    if (!advancing && vid.currentTime >= 5) advanceOrEnd();
  });
  vid.addEventListener('ended', advanceOrEnd);

  function updateSeek() {
    const dur = Math.min(vid.duration || 0, 5);
    const pct = dur > 0 ? Math.min(vid.currentTime, 5) / dur * 100 : 0;
    document.getElementById('seek-fill').style.width = pct + '%';
    document.getElementById('time-display').textContent =
      fmt(Math.min(vid.currentTime,5)) + ' / ' + fmt(dur);
  }

  function fmt(s) {
    return Math.floor(s/60)+':'+(Math.floor(s%60)).toString().padStart(2,'0');
  }

  function togglePlay() {
    if (vid.paused) { vid.play(); document.getElementById('btn-play').textContent='❚❚ Pause'; }
    else            { vid.pause(); document.getElementById('btn-play').textContent='▶ Play'; }
  }
  function stopTrack() {
    vid.pause(); vid.currentTime=0;
    document.getElementById('btn-play').textContent='▶ Play';
    document.getElementById('status-text').textContent='Stopped.';
  }
  function prevTrack() { loadTrack(currentIndex-1); }
  function nextTrack() { advanceOrEnd(); }
  function setVol(v)   { vid.volume=parseFloat(v); }
  function seekClick(e) {
    if (!vid.duration) return;
    const rect=e.currentTarget.getBoundingClientRect();
    vid.currentTime=Math.min(((e.clientX-rect.left)/rect.width)*5, 5);
  }
  function closePlayer() { document.getElementById('player-overlay').classList.remove('active'); }
  function openPlayer()  {
    document.getElementById('player-overlay').classList.add('active');
    buildPlaylist();
  }

  // ── CAMCORDER FILTER ──
  const grainCanvas = document.getElementById('grain-canvas');
  const gctx        = grainCanvas.getContext('2d');
  const timecodeEl  = document.getElementById('timecode');
  const vc          = document.getElementById('video-container');

  function resizeGrain() {
    grainCanvas.width  = vc.offsetWidth;
    grainCanvas.height = vc.offsetHeight;
  }
  resizeGrain();
  window.addEventListener('resize', resizeGrain);

  // ── GENTLE SHAKE: spring physics, slow impulses ──
  let shakeX=0, shakeY=0, shakeVX=0, shakeVY=0;
  // Max offset in px: 4:3 container uses 106% video, so ~3% margin each side.
  // For a 600px-tall container that's ~18px margin — keep max well under that.
  const SHAKE_MAX  = 8;    // max pixels, much gentler
  const IMPULSE    = 0.55; // random force per frame
  const DAMPING    = 0.90; // velocity decay (higher = slower)
  const SPRING     = 0.025; // pull back to centre (lower = lazier)
  const BLUR_BASE  = 1.2;
  const BLUR_SHAKE = 1.5;

  // Run shake update at ~15fps to feel sluggish / handheld, not jittery
  let lastShakeTime = 0;
  const SHAKE_INTERVAL = 66; // ms (~15fps)

  function drawFrame(ts) {
    // ── shake (throttled) ──
    if (ts - lastShakeTime >= SHAKE_INTERVAL) {
      lastShakeTime = ts;
      shakeVX += (Math.random()-0.5) * IMPULSE;
      shakeVY += (Math.random()-0.5) * IMPULSE;
      shakeVX *= DAMPING;
      shakeVY *= DAMPING;
      shakeVX -= shakeX * SPRING;
      shakeVY -= shakeY * SPRING;
      shakeX  += shakeVX;
      shakeY  += shakeVY;
      shakeX   = Math.max(-SHAKE_MAX, Math.min(SHAKE_MAX, shakeX));
      shakeY   = Math.max(-SHAKE_MAX, Math.min(SHAKE_MAX, shakeY));

      const mag  = Math.sqrt(shakeX*shakeX + shakeY*shakeY) / SHAKE_MAX;
      const blur = BLUR_BASE + mag * BLUR_SHAKE;

      vid.style.setProperty('--vid-tx',   shakeX.toFixed(2)+'px');
      vid.style.setProperty('--vid-ty',   shakeY.toFixed(2)+'px');
      vid.style.setProperty('--vid-blur', blur.toFixed(2)+'px');
    }

    // ── grain (every frame, but only as big as the container) ──
    const w = grainCanvas.width, h = grainCanvas.height;
    if (w > 0 && h > 0) {
      const img = gctx.createImageData(w, h);
      const d   = img.data;
      for (let i=0; i<d.length; i+=4) {
        const v = (Math.random()*255)|0;
        d[i]=v; d[i+1]=v; d[i+2]=v;
        d[i+3] = (Math.random()*65+10)|0;
      }
      gctx.putImageData(img, 0, 0);
      if (Math.random()<0.04) {
        const by=(Math.random()*h)|0;
        gctx.fillStyle=`rgba(255,255,255,${(Math.random()*0.12).toFixed(2)})`;
        gctx.fillRect(0, by, w, (Math.random()*4+1)|0);
      }
    }

    // ── timecode ──
    if (!vid.paused && vid.currentTime > 0) {
      const now = new Date();
      timecodeEl.textContent =
        `REC ● ${now.getFullYear()}.` +
        `${String(now.getMonth()+1).padStart(2,'0')}.` +
        `${String(now.getDate()).padStart(2,'0')} ` +
        fmtTC(vid.currentTime);
    } else {
      timecodeEl.textContent = '';
    }

    requestAnimationFrame(drawFrame);
  }
  requestAnimationFrame(drawFrame);

  function fmtTC(s) {
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60),
          sec=Math.floor(s%60), fr=Math.floor((s%1)*30);
    return [h,m,sec,fr].map(x=>String(x).padStart(2,'0')).join(':');
  }
</script>
