<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>JaxCorp</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #shell-frame {
      width:100%; height:100%;
      border:none; display:block;
    }

    /* ── WINDOWS XP BOOT SCREEN ── */
    #loading-overlay {
      display:none;
      position:fixed; inset:0;
      background:#000;
      z-index:9999;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    #loading-overlay.active { display:flex; }

    /* Windows flag logo */
    #xp-flag {
      width:120px; height:90px;
      margin-bottom:18px;
      position:relative;
    }

    /* Microsoft® wordmark above Windows */
    #xp-microsoft {
      font-family:'Times New Roman',serif;
      font-size:16px; color:#ccc;
      letter-spacing:0.05em;
      margin-bottom:2px;
      align-self:center;
      /* nudge to align with logo centre */
    }

    #xp-wordmark {
      text-align:center;
      margin-bottom:6px;
    }
    #xp-windows {
      font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
      font-size:52px; color:#fff;
      font-weight:400;
      letter-spacing:-0.01em;
      line-height:1;
      display:inline;
    }
    #xp-super {
      font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
      font-size:26px; color:#f80; font-weight:400;
      vertical-align:super; line-height:0;
    }
    #xp-edition {
      font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
      font-size:28px; color:#ccc; font-weight:400;
      letter-spacing:0.02em;
      margin-top:2px;
    }

    /* progress bar — XP boot style: small rounded track, moving blocks */
    #xp-progress-wrap {
      margin-top:48px;
      width:200px;
    }
    #xp-bar-track {
      width:100%; height:14px;
      border:1px solid #555;
      border-radius:7px;
      background:#111;
      overflow:hidden;
      position:relative;
    }
    /* The three animated blocks */
    .xp-block {
      position:absolute;
      top:2px; height:10px; width:18px;
      background:linear-gradient(to bottom,#6ab0f8,#1860d0);
      border-radius:4px;
      animation: xp-march 1.2s linear infinite;
    }
    .xp-block:nth-child(1) { animation-delay:0s; }
    .xp-block:nth-child(2) { animation-delay:0.4s; }
    .xp-block:nth-child(3) { animation-delay:0.8s; }

    @keyframes xp-march {
      0%   { left: -22px; opacity:0; }
      5%   { opacity:1; }
      90%  { opacity:1; }
      100% { left: calc(100% + 4px); opacity:0; }
    }

    /* copyright footer */
    #xp-copyright {
      position:fixed; bottom:20px; left:20px;
      font-family:'Tahoma',sans-serif; font-size:11px; color:#666;
      line-height:1.6;
    }
    #xp-ms-logo {
      position:fixed; bottom:16px; right:20px;
      font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
      font-size:20px; color:#aaa; letter-spacing:0.02em;
      font-style:italic;
    }
  </style>
</head>
<body>

  <iframe id="shell-frame" src="login.html" allowfullscreen></iframe>

  <div id="loading-overlay">

    <!-- Windows flag SVG -->
    <svg id="xp-flag" viewBox="0 0 120 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- four quadrants with wave/wave shape -->
      <!-- red (top-left) -->
      <path d="M4 8 C20 4 36 2 56 10 C56 30 56 44 56 44 C36 40 20 42 4 46 Z" fill="#e03010"/>
      <!-- green (top-right) -->
      <path d="M60 8 C76 2 96 2 116 6 C116 6 116 42 116 44 C96 38 76 38 60 44 Z" fill="#80c020"/>
      <!-- blue (bottom-left) -->
      <path d="M4 50 C20 44 36 44 56 48 C56 60 56 80 56 82 C36 84 18 82 4 80 Z" fill="#1060c8"/>
      <!-- yellow (bottom-right) -->
      <path d="M60 48 C76 40 96 38 116 46 C116 64 116 80 116 82 C96 84 76 84 60 82 Z" fill="#f8c000"/>
      <!-- subtle shine -->
      <ellipse cx="60" cy="44" rx="56" ry="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </svg>

    <div id="xp-wordmark">
      <div id="xp-microsoft">Microsoft<sup style="font-size:10px">®</sup></div>
      <div>
        <span id="xp-windows">Windows</span><span id="xp-super">xp</span>
      </div>
      <div id="xp-edition">Enterprise</div>
    </div>

    <div id="xp-progress-wrap">
      <div id="xp-bar-track">
        <div class="xp-block"></div>
        <div class="xp-block"></div>
        <div class="xp-block"></div>
      </div>
    </div>

    <div id="xp-copyright">
      Copyright &copy; 1985-2001<br/>Microsoft Corporation
    </div>
    <div id="xp-ms-logo"><em>Microsoft</em></div>
  </div>

</body>
<script>
  const frame   = document.getElementById('shell-frame');
  const overlay = document.getElementById('loading-overlay');

  window.addEventListener('message', e => {
    if (e.data === 'jax-login-success') startLoading();
  });

  function startLoading() {
    overlay.classList.add('active');

    // Load desktop in background immediately
    frame.src = 'desktop.html';

    // Show for exactly 3 seconds, then hide
    setTimeout(() => {
      overlay.classList.remove('active');
    }, 3000);
  }

  // F key fullscreen
  document.addEventListener('keydown', e => {
    if (e.key !== 'f' && e.key !== 'F') return;
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen().catch(()=>{});
    }
  });
</script>
</html>
