<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>JaxCorp</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #shell-frame {
      width:100%; height:100%;
      border:none; display:block;
    }

    /* ── WINDOWS XP BOOT SCREEN ── */
    #loading-overlay {
      display:none;
      position:fixed; inset:0;
      background:#000;
      z-index:9999;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    #loading-overlay.active { display:flex; }

    /* Flag image */
    #xp-flag {
      width:140px;
      margin-bottom:16px;
      display:block;
    }

    #xp-wordmark {
      text-align:center;
      margin-bottom:6px;
      line-height:1;
    }
    #xp-microsoft {
      font-family:'Times New Roman',serif;
      font-size:16px; color:#ccc;
      letter-spacing:0.05em;
      margin-bottom:3px;
    }
    #xp-windows {
      font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
      font-size:52px; color:#fff;
      font-weight:400;
      letter-spacing:-0.01em;
      display:inline;
    }
    #xp-super {
      font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
      font-size:26px; color:#f80; font-weight:400;
      vertical-align:super; line-height:0;
    }
    #xp-edition {
      font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
      font-size:28px; color:#ccc; font-weight:400;
      letter-spacing:0.02em;
      margin-top:4px;
    }

    /* progress bar */
    #xp-progress-wrap {
      margin-top:52px;
      width:216px;
    }
    #xp-bar-track {
      width:100%; height:14px;
      border:1px solid #555;
      border-radius:7px;
      background:#111;
      overflow:hidden;
      position:relative;
    }

    /* Pills: each starts fully off the left edge, marches right, exits off right */
    .xp-block {
      position:absolute;
      top:2px; height:10px; width:20px;
      background:linear-gradient(to bottom,#6ab0f8,#1860d0);
      border-radius:4px;
      /* animation-fill-mode:backwards keeps the pill at its 0% keyframe position
         during the delay, so it stays off-screen rather than bunching at left:0 */
      animation: xp-march 1.5s linear infinite;
      animation-fill-mode: backwards;
    }
    .xp-block:nth-child(1) { animation-delay: 0s;   }
    .xp-block:nth-child(2) { animation-delay: 0.5s; }
    .xp-block:nth-child(3) { animation-delay: 1.0s; }

    @keyframes xp-march {
      0%   { left: -24px; }
      100% { left: calc(100% + 24px); }
    }

    /* copyright footer */
    #xp-copyright {
      position:fixed; bottom:20px; left:20px;
      font-family:'Tahoma',sans-serif; font-size:11px; color:#555;
      line-height:1.6;
    }
    #xp-ms-logo {
      position:fixed; bottom:16px; right:20px;
      font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif;
      font-size:20px; color:#888; letter-spacing:0.02em;
      font-style:italic;
    }
  </style>
</head>
<body>

  <iframe id="shell-frame" src="login.html" allowfullscreen></iframe>

  <div id="loading-overlay">
    <img id="xp-flag" src="windowsflag.png" alt=""/>

    <div id="xp-wordmark">
      <div id="xp-microsoft">Microsoft<sup style="font-size:10px">®</sup></div>
      <div>
        <span id="xp-windows">Windows</span><span id="xp-super">xp</span>
      </div>
      <div id="xp-edition">Enterprise</div>
    </div>

    <div id="xp-progress-wrap">
      <div id="xp-bar-track">
        <div class="xp-block"></div>
        <div class="xp-block"></div>
        <div class="xp-block"></div>
      </div>
    </div>

    <div id="xp-copyright">
      Copyright &copy; 1985-2001<br/>Microsoft Corporation
    </div>
    <div id="xp-ms-logo"><em>Microsoft</em></div>
  </div>

</body>
<script>
  const frame   = document.getElementById('shell-frame');
  const overlay = document.getElementById('loading-overlay');

  window.addEventListener('message', e => {
    if (e.data === 'jax-login-success') startLoading();
  });

  function startLoading() {
    // 1. Show the boot screen immediately
    overlay.classList.add('active');

    // 2. After 3 seconds, swap the iframe src to desktop
    //    Doing it AFTER the overlay is up means the iframe load
    //    happens while we're covering it — fullscreen stays on
    //    the parent document throughout.
    setTimeout(() => {
      frame.src = 'desktop.html';
      // Hide overlay once desktop has loaded, or after a max of 2s
      const hideOverlay = () => overlay.classList.remove('active');
      frame.addEventListener('load', hideOverlay, { once: true });
      setTimeout(hideOverlay, 2000);
    }, 3000);
  }

  // F key fullscreen — always on the parent doc so it's never lost
  document.addEventListener('keydown', e => {
    if (e.key !== 'f' && e.key !== 'F') return;
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen().catch(()=>{});
    }
  });
</script>
</html>
