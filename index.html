<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalPuppets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #c8c8c8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 { font-size: 2rem; color: #fff; letter-spacing: 0.2em; margin-bottom: 1rem; }
    p { color: #666; margin-bottom: 2rem; }
    a {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border: 1px solid #444;
      color: #aaa;
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: all 0.2s;
    }
    a:hover { border-color: #fff; color: #fff; }
  </style>
</head>
<body>
  <h1>DIGITAL PUPPETS</h1>
  <p>Interactive experiences</p>
  <a href="Vector/login.html">→ Enter</a>
</body>
<script>
  document.addEventListener('keydown', e => {
    if (e.key !== 'f' && e.key !== 'F') return;
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen().catch(()=>{});
    }
  });
</script>
</html>
